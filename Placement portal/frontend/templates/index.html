<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4"></script>

    <style>
        body {
            background-color: #f8fafc;
            min-height: 100vh;
        }

        .modal {
            z-index: 1060 !important;
        }

        .modal-backdrop {
            z-index: 1050 !important;
        }

        .text-indigo {
            color: #4B0082;
        }

        #app {
            position: relative;
            z-index: 1;
        }

        

    </style>
</head>

<body>
    <div id="app">
        <nav v-if="!$route.meta.hideNavbar" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
            <div class="container">
                <router-link class="navbar-brand fw-bold fs-4" to="/">Placement Portal</router-link>

                <div class="d-flex gap-2">
                    <router-link v-if="!isLoggedIn" to="/login" class="btn btn-primary px-4">Login</router-link>
                    <router-link v-if="!isLoggedIn" to="/register"
                        class="btn btn-warning px-4 text-dark fw-medium">Register</router-link>
                </div>
            </div>
        </nav>

        <div class="container mt-5">
            <router-view></router-view>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/static/component/home.js"></script>
    <script src="/static/component/login.js"></script>
    <script src="/static/component/register.js"></script>
    <script src="/static/component/student_dashboard.js"></script>
    <script src="/static/component/company_dashboard.js"></script>
    <script src="/static/component/admin_dashboard.js"></script>

    <script src="/static/component/route.js"></script>

    <script src="/static/component/app.js"></script>
</body>

</html>
